[connection]
string = "udp:127.0.0.1:14550"

[camera]
type = "imagezmq"
streamer_type = "imagezmq"
index = 0
imagezmq_listen_uri = "tcp://127.0.0.1:5555"

[camera_matrix]
# Focal length
fx = 800.0
fy = 800.0

# Optical center
cx = 500.0
cy = 500.0

[apriltag]
target_tag_id = 1
tag_size = 1

[landing]
refresh_rate_seconds = 0.1
max_landing_time_seconds = 60.0
height_threshold = 0.1

[debug]
drawer_enabled = false